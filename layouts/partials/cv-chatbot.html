<div id="cv-chat-widget" data-lang="{{ .Site.Language.Lang }}">
  <button id="cv-chat-toggle" class="cv-chat-toggle" type="button" aria-label="{{ i18n "chatToggleLabel" }}" aria-expanded="false" aria-controls="cv-chat-panel">
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M4 4h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H8l-4 4V6a2 2 0 0 1 2-2z"/>
    </svg>
  </button>

  <div id="cv-chat-panel" class="cv-chat-panel" hidden>
    <div class="cv-chat-header">
      <span>{{ i18n "chatHeader" }}</span>
      <button id="cv-chat-close" class="cv-chat-close" type="button" aria-label="{{ i18n "chatClose" }}">&times;</button>
    </div>
    <div id="cv-chat-status" class="cv-chat-status">{{ i18n "chatStarting" }}</div>
    <div id="cv-chat-messages" class="cv-chat-messages"></div>
    <div class="cv-chat-chips">
      <button class="cv-chat-chip" data-q="{{ i18n "chatQEducation" }}">{{ i18n "chatChipEducation" }}</button>
      <button class="cv-chat-chip" data-q="{{ i18n "chatQProjects" }}">{{ i18n "chatChipProjects" }}</button>
      <button class="cv-chat-chip" data-q="{{ i18n "chatQPublications" }}">{{ i18n "chatChipPublications" }}</button>
      <button class="cv-chat-chip" data-q="{{ i18n "chatQContact" }}">{{ i18n "chatChipContact" }}</button>
    </div>
    <form id="cv-chat-form" class="cv-chat-input-row">
      <input id="cv-chat-input" type="text" placeholder="{{ i18n "chatPlaceholder" }}" disabled autocomplete="off" />
      <button type="submit" disabled>{{ i18n "chatSend" }}</button>
    </form>
  </div>
</div>
<script type="module" src="{{ "js/cv-chat-widget.js" | relURL }}"></script>
