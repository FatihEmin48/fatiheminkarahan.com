{{ $pageTitle := .Title }}
{{ if .IsHome }}{{ $pageTitle = .Site.Title }}{{ end }}
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ $pageTitle }}{{ else }}{{ $pageTitle }} · {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ .Site.Params.description }}">
<link rel="icon" href="{{ .Site.Params.avatarURL | relURL }}">
<meta property="og:type" content="website">
<meta property="og:title" content="{{ $pageTitle }}">
<meta property="og:description" content="{{ .Site.Params.description }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:image" content="{{ .Site.Params.avatarURL | absURL }}">
<meta property="og:locale" content="{{ .Site.Language.Locale }}">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{{ $pageTitle }}">
<meta name="twitter:description" content="{{ .Site.Params.description }}">
<meta name="twitter:image" content="{{ .Site.Params.avatarURL | absURL }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" integrity="sha512-+4zCK9k+qNFUR5W1AURgxagxqfWHFdRJqjZbY2+/rH+9K9AGr8V4jK5s7ie1S6f5uIqUXwRV5uSKObF2XjaVMg==" crossorigin="anonymous" referrerpolicy="no-referrer">
<link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
{{ if .IsTranslated }}
  {{ range .AllTranslations }}
  <link rel="alternate" hreflang="{{ .Language.Lang }}" href="{{ .Permalink }}">
  {{ end }}
{{ else }}
  <link rel="alternate" hreflang="{{ .Site.Language.Lang }}" href="{{ .Permalink }}">
{{ end }}
<link rel="alternate" hreflang="x-default" href="{{ "/" | absURL }}">
